treatment = "inline_infographic"
anchor_text = "An eval harness is the part of the system that turns prior experience into reusable tests. It is usually built from unglamorous material: production traces, reviewed outputs, rejected generations, approved examples, edge cases, support tickets, bug reports, and the private notes of people who understand the work. Its value comes from preserving those materials in a form that can be run again."
