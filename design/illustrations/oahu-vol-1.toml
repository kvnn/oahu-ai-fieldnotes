chapter_slug = "the-loop-is-the-teacher"
asset_path = "assets/figures/ch03-use-loops-three-loops.svg"
treatment = "inline_infographic"
anchor_text = "It is tempting to treat the language model as the center of the system. In the first weeks of using one seriously, that is almost unavoidable. The model is the part that speaks back. It writes the paragraph, proposes the code, classifies the record, suggests the next step, and gives the experience its surface intelligence. But in the end, the most useful unit is not the prompt and response. It is the loop that surrounds them."
