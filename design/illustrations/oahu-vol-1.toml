treatment = "inline_infographic"
anchor_text = "Most people who use language models for any length of time develop an instinct for prompting. They learn that asking for a list produces one kind of answer, that asking for a memo produces another, that examples often help, that tone changes with small shifts in address, and that certain phrases seem to make the model more careful. This informal prompt engineering is real craft knowledge. It comes from repeated contact with the system."
