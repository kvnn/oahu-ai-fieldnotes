<rect x="458" y="186" width="92" height="118" rx="4" fill="none" stroke="#ABA28D" stroke-width="0.5" opacity="0.22"/>
<g fill="none" stroke="#ABA28D" stroke-width="1" opacity="0.5">
<circle cx="478" cy="212" r="3.5"/><line x1="492" y1="212" x2="538" y2="212"/>
