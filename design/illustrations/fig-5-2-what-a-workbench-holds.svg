<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>What a workbench holds</title>
<desc>An abstract floor-plan of a workbench: the artifact sits lit at the center, a material rail to the left and tools to the right both point inward at it, a state strip runs across the top, and a single gate sits below as the one deliberate commit point.</desc>
<style>.m{font-family:'IBM Plex Mono','SF Mono','Menlo',monospace;}</style>
<defs>
<marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="420" fill="#221733"/>

<text class="m" x="40" y="44" font-size="9" letter-spacing="3" fill="#6B5A82">V · WORKBENCHES</text>
<text class="m" x="640" y="44" text-anchor="end" font-size="9" letter-spacing="2" fill="#8B8474">FIG. 5.2</text>

