<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>A scatter of one-off work condenses into a permanent home</title>
<desc>On the left, scattered marks represent one-off work; most have no path because they happen once. A few recur and funnel rightward, converging into a bounded workbench with the artifact lit at its center.</desc>
<style>.m{font-family:'IBM Plex Mono','SF Mono','Menlo',monospace;}</style>
<defs>
<marker id="ar1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="360" fill="#221733"/>

<text class="m" x="40" y="44" font-size="9" letter-spacing="3" fill="#6B5A82">V · WORKBENCHES</text>
<text class="m" x="640" y="44" text-anchor="end" font-size="9" letter-spacing="2" fill="#8B8474">FIG. 5.1</text>

<g stroke="#ABA28D" fill="none" stroke-width="0.6" opacity="0.22">
<line x1="92" y1="132" x2="464" y2="186"/>
<line x1="120" y1="162" x2="464" y2="186"/>
<line x1="162" y1="182" x2="464" y2="186"/>
<line x1="208" y1="204" x2="464" y2="186"/>
</g>

<g fill="#ABA28D" stroke="#ABA28D" opacity="0.5">
<circle cx="104" cy="208" r="2" stroke="none"/>
<line x1="150" y1="122" x2="150" y2="134" stroke-width="1"/>
<line x1="132" y1="240" x2="144" y2="240" stroke-width="1"/>
<circle cx="196" cy="150" r="2" stroke="none"/>
<circle cx="178" cy="252" r="2" stroke="none"/>
<line x1="228" y1="176" x2="240" y2="176" stroke-width="1"/>
<circle cx="240" cy="220" r="2" stroke="none"/>
</g>

<g fill="#ABA28D" stroke="#ABA28D" opacity="0.9">
<circle cx="92" cy="132" r="2.5" stroke="none"/>
<line x1="114" y1="162" x2="126" y2="162" stroke-width="1"/>
<circle cx="162" cy="182" r="2.5" stroke="none"/>
<line x1="208" y1="198" x2="208" y2="210" stroke-width="1"/>
</g>

<circle cx="464" cy="186" r="3" fill="#ABA28D" opacity="0.5"/>
<line x1="468" y1="186" x2="486" y2="186" stroke="#ABA28D" stroke-width="0.75" opacity="0.7" marker-end="url(#ar1)"/>

<rect x="490" y="140" width="130" height="92" rx="6" fill="none" stroke="#ABA28D" stroke-width="0.75"/>
<g stroke="#ABA28D" stroke-width="1" opacity="0.5">
<line x1="512" y1="156" x2="524" y2="156"/><line x1="548" y1="156" x2="560" y2="156"/><line x1="584" y1="156" x2="596" y2="156"/>
<line x1="512" y1="216" x2="524" y2="216"/><line x1="584" y1="216" x2="596" y2="216"/>
</g>
<rect x="528" y="168" width="54" height="36" rx="3" fill="#EFE6CE"/>
<text class="m" x="555" y="190" text-anchor="middle" font-size="7" letter-spacing="0.5" fill="#221733">ARTIFACT</text>

<text class="m" x="150" y="300" text-anchor="middle" font-size="9" letter-spacing="1.5" fill="#8B8474">ONE-OFF WORK</text>
<text class="m" x="555" y="300" text-anchor="middle" font-size="9" letter-spacing="1.5" fill="#C8BFA9">A PERMANENT HOME</text>

