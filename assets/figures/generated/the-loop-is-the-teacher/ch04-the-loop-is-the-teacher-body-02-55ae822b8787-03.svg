<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Grounded Collaboration Triangle</title><desc>The trace loop as collaboration among human direction, coding agent inspection, and recorded run results, all routed through a central trace database.</desc><defs><marker id='a3' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='p3' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker></defs><g fill='none' stroke='#221733' stroke-width='3' stroke-linejoin='round'><rect x='110' y='140' width='230' height='120' rx='12'/><rect x='860' y='140' width='230' height='120' rx='12'/><rect x='485' y='560' width='230' height='120' rx='12'/></g><g font-family='sans-serif' fill='#221733' text-anchor='middle'><text x='225' y='190' font-size='22'>human</text><text x='225' y='220' font-size='18'>asks from failure</text><text x='975' y='190' font-size='22'>coding agent</text><text x='975' y='220' font-size='18'>inspects traces</text><text x='600' y='610' font-size='22'>run results</text><text x='600' y='640' font-size='18'>actual sequence</text></g><g fill='#efe6ce' stroke='#221733' stroke-width='3'><path d='M440 330h320v130H440z'/><path d='M440 360h320'/><path d='M440 390h320'/><path d='M440 420h320'/></g><text x='600' y='314' font-family='sans-serif' font-size='23' fill='#221733' text-anchor='middle'>trace database</text><g font-family='sans-serif' font-size='17' fill='#221733'><text x='462' y='353'>what the model saw</text><text x='462' y='383'>what it chose</text><text x='462' y='413'>what the app returned</text><text x='462' y='443'>where the chain broke</text></g><g fill='none' stroke='#221733' stroke-width='4'><path d='M340 205C430 215 445 285 485 330' marker-end='url(#a3)'/><path d='M760 330C805 285 835 215 860 205' marker-end='url(#a3)'/><path d='M975 260C930 430 790 570 718 610' marker-end='url(#a3)'/><path d='M485 610C390 560 260 420 225 260' marker-end='url(#a3)'/></g><path d='M600 560V466' fill='none' stroke='#9b7fbc' stroke-width='5' marker-end='url(#p3)'/><circle cx='600' cy='445' r='11' fill='#9b7fbc'/><text x='600' y='735' font-family='sans-serif' font-size='20' fill='#6b5a82' text-anchor='middle'>the loop closes through evidence, not memory</text></svg>
