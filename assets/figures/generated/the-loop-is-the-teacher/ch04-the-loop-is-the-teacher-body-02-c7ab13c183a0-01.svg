<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Trace Loop Clock</title><desc>Pattern One, the trace loop: six runtime simulator steps circle a central deterministic ledger, while a separate debugging loop passes through me and a coding agent before returning corrections to the runtime loop.</desc><defs><marker id='tlc-dark' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='tlc-purple' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker><marker id='tlc-hair' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='5' markerHeight='5' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#8b8474'/></marker></defs><text x='70' y='58' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='25' fill='#221733'>PATTERN ONE — THE TRACE LOOP</text><g fill='none' stroke='#221733' stroke-width='3'><rect x='465' y='78' width='270' height='72' rx='14'/><rect x='838' y='184' width='250' height='82' rx='14'/><rect x='832' y='476' width='260' height='82' rx='14'/><rect x='455' y='626' width='290' height='72' rx='14'/><rect x='108' y='476' width='260' height='82' rx='14'/><rect x='112' y='184' width='275' height='82' rx='14'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' fill='#221733' text-anchor='middle'><text x='600' y='107' font-size='15'>incident description</text><text x='600' y='130' font-size='15'>+ visible HTML</text><text x='963' y='215' font-size='15'>simulator LLM</text><text x='963' y='238' font-size='15'>chooses next action</text><text x='962' y='507' font-size='15'>structured action map</text><text x='962' y='530' font-size='15'>fill / click / stop</text><text x='600' y='654' font-size='15'>frontend guard + backend</text><text x='600' y='677' font-size='15'>verdict / return payload</text><text x='238' y='507' font-size='15'>new visible HTML</text><text x='238' y='530' font-size='15'>or legitimate stop</text><text x='249' y='215' font-size='15'>state check</text><text x='249' y='238' font-size='15'>invalid branch?</text></g><path d='M730 112C933 144 1085 296 1088 440C1090 548 1000 620 755 658' fill='none' stroke='#221733' stroke-width='7' stroke-linecap='round' marker-end='url(#tlc-dark)'/><path d='M455 660C225 621 108 515 105 395C102 262 251 148 465 112' fill='none' stroke='#221733' stroke-width='7' stroke-linecap='round' marker-end='url(#tlc-dark)'/><text x='600' y='741' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='19' fill='#221733'>one form step repeats</text><rect x='410' y='292' width='380' height='218' rx='16' fill='#efe6ce' stroke='#221733' stroke-width='4'/><text x='600' y='325' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#221733'>TRACE DATABASE</text><text x='600' y='349' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#6b5a82'>DETERMINISTIC LEDGER — NOT DECISION MAKER</text><g stroke='#c8bfa9' stroke-width='2'><path d='M434 370H766'/><path d='M434 394H766'/><path d='M434 418H766'/><path d='M434 442H766'/><path d='M434 466H766'/><path d='M434 490H766'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='13' fill='#221733'><text x='448' y='386'>what the model saw</text><text x='448' y='410'>what it chose</text><text x='448' y='434'>how the frontend interpreted it</text><text x='448' y='458'>what the backend returned</text><text x='448' y='482'>where the chain broke</text><text x='448' y='506'>why it stopped</text></g><g fill='none' stroke='#8b8474' stroke-width='1.7' marker-end='url(#tlc-hair)'><path d='M600 150L600 292'/><path d='M838 230L790 330'/><path d='M832 510L790 470'/><path d='M600 626L600 510'/><path d='M368 515L410 468'/><path d='M387 226L410 334'/></g><g fill='none' stroke='#9b7fbc' stroke-width='4' stroke-linecap='round' marker-end='url(#tlc-purple)'><path d='M790 382C880 350 910 318 940 285'/><path d='M1040 322C1085 395 1082 482 1035 555'/><path d='M900 625C845 658 800 668 746 662'/></g><g fill='none' stroke='#9b7fbc' stroke-width='3'><rect x='940' y='244' width='180' height='78' rx='14'/><rect x='890' y='556' width='230' height='78' rx='14'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' fill='#6b5a82' text-anchor='middle'><text x='1030' y='276' font-size='15'>me +</text><text x='1030' y='299' font-size='15'>coding agent</text><text x='1005' y='588' font-size='15'>patch / failsafe</text><text x='1005' y='611' font-size='15'>/ refactor</text><text x='1012' y='373' font-size='14'>debugging loop</text></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12' fill='#221733'><rect x='300' y='286' width='88' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='344' y='306' text-anchor='middle'>wrong click</text><rect x='801' y='286' width='82' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='842' y='306' text-anchor='middle'>early stop</text><rect x='294' y='501' width='102' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='345' y='521' text-anchor='middle'>invalid branch</text><rect x='807' y='501' width='76' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='845' y='521' text-anchor='middle'>slow path</text></g><text x='600' y='775' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#6b5a82'>“the loop closes against records, not recollection”</text></svg>
