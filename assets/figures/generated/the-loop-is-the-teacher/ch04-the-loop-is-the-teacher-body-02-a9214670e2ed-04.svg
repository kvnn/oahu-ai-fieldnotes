<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" data-figure-system="fieldnotes-v1"><title>What Each Layer Left Behind</title><desc>Frontend, LLM, and backend layers each write requests and responses into the same trace column. The highlighted gap shows where the chain broke.</desc><defs><marker id="arrow-wl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#221733"/></marker><marker id="arrow-wlp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9b7fbc"/></marker></defs><g font-family="sans-serif" fill="#221733"><text x="150" y="145" font-size="22">frontend</text><text x="150" y="305" font-size="22">LLM</text><text x="150" y="465" font-size="22">backend</text></g><g fill="none" stroke="#221733" stroke-width="3"><rect x="260" y="105" width="250" height="80" rx="10"/><rect x="260" y="265" width="250" height="80" rx="10"/><rect x="260" y="425" width="250" height="80" rx="10"/></g><g font-family="sans-serif" font-size="18" fill="#221733"><text x="285" y="140">visible controls</text><text x="285" y="166">click verdict</text><text x="285" y="300">HTML + incident</text><text x="285" y="326">next action</text><text x="285" y="460">state check</text><text x="285" y="486">return payload</text></g><rect x="720" y="80" width="270" height="500" rx="14" fill="#efe6ce" stroke="#221733" stroke-width="3"/><text x="855" y="120" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#221733">shared trace</text><g stroke="#aba28d" stroke-width="2"><path d="M750 155H960"/><path d="M750 215H960"/><path d="M750 275H960"/><path d="M750 335H960"/><path d="M750 395H960"/><path d="M750 455H960"/><path d="M750 515H960"/></g><g font-family="sans-serif" font-size="17" fill="#221733"><text x="765" y="190">request</text><text x="765" y="250">response</text><text x="765" y="310">prompt</text><text x="765" y="370">completion</text><text x="765" y="430">tool call</text><text x="765" y="490">error</text><text x="765" y="550">terminal check</text></g><g fill="none" stroke="#221733" stroke-width="4"><path d="M510 145H715" marker-end="url(#arrow-wl)"/><path d="M510 305H715" marker-end="url(#arrow-wl)"/><path d="M510 465H715" marker-end="url(#arrow-wl)"/></g><path d="M990 490C1050 540 1045 635 940 665H370C285 665 235 610 260 505" fill="none" stroke="#9b7fbc" stroke-width="4" marker-end="url(#arrow-wlp)"/><circle cx="855" cy="490" r="12" fill="#9b7fbc"/><text x="600" y="715" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#6b5a82">the agent debugs the exchange each layer actually left behind</text></svg>
