<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" data-figure-system="fieldnotes-v1"><title>Opaque Workflow Made Inspectable</title><desc>A large conditional workflow appears as many pale tangled paths. A numbered trace path reveals the actual sequence and locates the failure point.</desc><defs><marker id="arrow-ow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#221733"/></marker></defs><rect x="110" y="115" width="980" height="500" rx="18" fill="none" stroke="#8b8474" stroke-width="2" stroke-dasharray="8 10"/><text x="150" y="160" font-family="sans-serif" font-size="22" fill="#221733">workflow too large to inspect by hand</text><g fill="none" stroke="#c8bfa9" stroke-width="2" opacity="0.95"><path d="M160 250C300 110 390 420 545 260S780 130 1010 310"/><path d="M160 310C320 390 350 180 515 335S770 520 1015 230"/><path d="M160 370C330 245 420 610 580 455S800 360 1015 455"/><path d="M160 430C310 570 400 285 555 390S820 180 1015 385"/><path d="M160 490C345 515 390 470 540 545S770 625 1015 520"/><path d="M160 220C360 270 410 315 610 205S815 240 1015 180"/><path d="M160 540C330 360 455 735 620 560S800 430 1015 590"/></g><path d="M165 310C320 390 350 180 515 335S770 520 1015 230" fill="none" stroke="#221733" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-ow)"/><g fill="#efe6ce" stroke="#221733" stroke-width="3"><circle cx="165" cy="310" r="22"/><circle cx="350" cy="180" r="22"/><circle cx="515" cy="335" r="22"/><circle cx="770" cy="520" r="22"/></g><circle cx="1015" cy="230" r="25" fill="#9b7fbc"/><g font-family="sans-serif" font-size="17" text-anchor="middle"><text x="165" y="316" fill="#221733">1</text><text x="350" y="186" fill="#221733">2</text><text x="515" y="341" fill="#221733">3</text><text x="770" y="526" fill="#221733">4</text><text x="1015" y="236" fill="#efe6ce">5</text></g><rect x="325" y="650" width="550" height="72" rx="10" fill="none" stroke="#221733" stroke-width="3"/><text x="600" y="695" text-anchor="middle" font-family="sans-serif" font-size="21" fill="#221733">failure has an address: run 18 · step 5 · wrong branch</text></svg>
