<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" data-figure-system="fieldnotes-v1"><title>Slow Trace, Refactored Loop</title><desc>A trace loop records timing as well as decisions. A slow segment is highlighted, sent through a refactor gate, and returned as a shorter next run.</desc><defs><marker id="arrow-st" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#221733"/></marker><marker id="arrow-stp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9b7fbc"/></marker></defs><path d="M250 395C250 245 385 150 560 150H670C845 150 970 250 970 395C970 545 835 640 660 640H540C365 640 250 545 250 395Z" fill="none" stroke="#221733" stroke-width="4" marker-end="url(#arrow-st)"/><g stroke="#aba28d" stroke-width="3"><path d="M340 238l28 32"/><path d="M450 175l12 40"/><path d="M585 150v42"/><path d="M730 170l-14 40"/><path d="M855 245l-28 32"/><path d="M940 365h-42"/><path d="M880 540l-32-28"/><path d="M720 625l-12-40"/><path d="M555 640v-42"/><path d="M385 575l30-30"/><path d="M265 430h42"/></g><g fill="#efe6ce" stroke="#221733" stroke-width="3"><rect x="465" y="315" width="300" height="120" rx="14"/><path d="M465 355h300"/><path d="M465 395h300"/></g><text x="615" y="300" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#221733">trace timings</text><g font-family="sans-serif" font-size="18" fill="#221733"><text x="490" y="345">step count</text><text x="490" y="385">latency</text><text x="490" y="425">repeat calls</text></g><path d="M835 245C910 310 925 425 875 505" fill="none" stroke="#9b7fbc" stroke-width="7" stroke-linecap="round"/><text x="905" y="390" font-family="sans-serif" font-size="20" fill="#6b5a82">too slow</text><path d="M875 505C820 565 780 590 705 610" fill="none" stroke="#9b7fbc" stroke-width="4" marker-end="url(#arrow-stp)"/><rect x="455" y="560" width="210" height="86" rx="12" fill="none" stroke="#221733" stroke-width="3"/><text x="560" y="595" text-anchor="middle" font-family="sans-serif" font-size="21" fill="#221733">refactor gate</text><text x="560" y="623" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#221733">same evidence</text><path d="M455 603C345 565 300 500 302 425" fill="none" stroke="#221733" stroke-width="3" marker-end="url(#arrow-st)"/><text x="600" y="725" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#6b5a82">the trace loop names slowness before the next design inherits it</text></svg>
