<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Passive Ledger, Active Loop</title><desc>The runtime simulator loop is drawn as the active dark circuit, while the trace database is a passive deterministic ledger. A separate lavender debugging loop routes through me plus coding agent and patch failsafe refactor before returning to runtime.</desc><defs><marker id='pla-dark' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='pla-purple' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker><marker id='pla-hair' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='5' markerHeight='5' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#8b8474'/></marker></defs><text x='75' y='56' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='25' fill='#221733'>PATTERN ONE — THE TRACE LOOP</text><path d='M322 170C455 74 720 76 875 170C1015 255 1030 542 875 628C724 712 456 714 322 628C164 526 176 276 322 170Z' fill='none' stroke='#221733' stroke-width='7' stroke-linecap='round' marker-end='url(#pla-dark)'/><text x='600' y='724' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='17' fill='#221733'>one form step repeats</text><g fill='#efe6ce' stroke='#221733' stroke-width='3'><rect x='180' y='118' width='260' height='76' rx='14'/><rect x='470' y='80' width='260' height='76' rx='14'/><rect x='760' y='118' width='260' height='76' rx='14'/><rect x='790' y='570' width='270' height='76' rx='14'/><rect x='470' y='644' width='260' height='76' rx='14'/><rect x='140' y='570' width='270' height='76' rx='14'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='13.5' fill='#221733' text-anchor='middle'><text x='310' y='148'>incident description</text><text x='310' y='170'>+ visible HTML</text><text x='600' y='110'>simulator LLM</text><text x='600' y='132'>chooses next action</text><text x='890' y='148'>structured action map</text><text x='890' y='170'>fill / click / stop</text><text x='925' y='600'>frontend guard</text><text x='925' y='622'>click verdict / invalid</text><text x='600' y='674'>backend state check</text><text x='600' y='696'>+ return payload</text><text x='275' y='600'>new visible HTML</text><text x='275' y='622'>or legitimate stop</text></g><rect x='403' y='280' width='394' height='246' rx='18' fill='none' stroke='#221733' stroke-width='4'/><rect x='423' y='314' width='354' height='188' rx='10' fill='#efe6ce' stroke='#aba28d' stroke-width='2'/><text x='600' y='305' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#221733'>TRACE DATABASE</text><text x='600' y='338' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#6b5a82'>DETERMINISTIC LEDGER</text><text x='600' y='359' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12' fill='#8b8474'>append-only evidence, not planner</text><g stroke='#c8bfa9' stroke-width='2'><path d='M445 376H755'/><path d='M445 400H755'/><path d='M445 424H755'/><path d='M445 448H755'/><path d='M445 472H755'/><path d='M445 496H755'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12.5' fill='#221733'><text x='454' y='392'>what the model saw</text><text x='454' y='416'>what it chose</text><text x='454' y='440'>how the frontend interpreted it</text><text x='454' y='464'>what the backend returned</text><text x='454' y='488'>where the chain broke</text><text x='454' y='512'>why it stopped</text></g><g fill='none' stroke='#8b8474' stroke-width='1.5' marker-end='url(#pla-hair)'><path d='M350 194L430 314'/><path d='M600 156V314'/><path d='M850 194L770 314'/><path d='M895 570L770 502'/><path d='M600 644V526'/><path d='M310 570L430 502'/></g><g fill='none' stroke='#9b7fbc' stroke-width='4' stroke-linecap='round' marker-end='url(#pla-purple)'><path d='M797 400C888 392 920 350 943 313'/><path d='M1030 315C1112 405 1110 528 1037 602'/><path d='M895 642C830 662 773 672 730 682'/></g><g fill='none' stroke='#9b7fbc' stroke-width='3'><rect x='942' y='246' width='170' height='72' rx='13'/><rect x='840' y='602' width='220' height='72' rx='13'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' text-anchor='middle' fill='#6b5a82'><text x='1027' y='276' font-size='14'>me +</text><text x='1027' y='298' font-size='14'>coding agent</text><text x='950' y='631' font-size='14'>patch / failsafe</text><text x='950' y='653' font-size='14'>/ refactor</text></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12' fill='#221733' text-anchor='middle'><rect x='310' y='268' width='92' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='356' y='288'>wrong click</text><rect x='804' y='268' width='84' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='846' y='288'>early stop</text><rect x='290' y='524' width='112' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='346' y='544'>invalid branch</text><rect x='804' y='524' width='82' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='845' y='544'>slow path</text></g><text x='600' y='772' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#6b5a82'>“the loop closes against records, not recollection”</text></svg>
