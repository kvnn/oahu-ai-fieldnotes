<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Run Cycle Ledger</title><desc>A traced workflow cycle where visible HTML, model choice, action mapping, frontend state, and backend return each write evidence into a trace database; a highlighted break returns as a correction.</desc><defs><marker id='a1' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='p1' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker></defs><g fill='none' stroke='#221733' stroke-width='3' stroke-linejoin='round'><rect x='80' y='190' width='155' height='78' rx='10'/><rect x='285' y='190' width='155' height='78' rx='10'/><rect x='490' y='190' width='155' height='78' rx='10'/><rect x='695' y='190' width='155' height='78' rx='10'/><rect x='900' y='190' width='155' height='78' rx='10'/><path d='M235 229H280' marker-end='url(#a1)'/><path d='M440 229H485' marker-end='url(#a1)'/><path d='M645 229H690' marker-end='url(#a1)'/><path d='M850 229H895' marker-end='url(#a1)'/></g><g font-family='sans-serif' fill='#221733' text-anchor='middle'><text x='157' y='222' font-size='19'>visible</text><text x='157' y='247' font-size='19'>HTML</text><text x='362' y='222' font-size='19'>LLM</text><text x='362' y='247' font-size='19'>choice</text><text x='567' y='222' font-size='19'>action</text><text x='567' y='247' font-size='19'>mapper</text><text x='772' y='222' font-size='19'>frontend</text><text x='772' y='247' font-size='19'>state</text><text x='977' y='222' font-size='19'>backend</text><text x='977' y='247' font-size='19'>return</text></g><g fill='none' stroke='#aba28d' stroke-width='2'><path d='M157 268V438'/><path d='M362 268V468'/><path d='M567 268V498'/><path d='M772 268V528'/><path d='M977 268V558'/></g><rect x='210' y='410' width='780' height='220' rx='12' fill='none' stroke='#221733' stroke-width='3'/><g stroke='#c8bfa9' stroke-width='2'><path d='M235 455H965'/><path d='M235 485H965'/><path d='M235 515H965'/><path d='M235 545H965'/><path d='M235 575H965'/></g><g font-family='sans-serif' font-size='18' fill='#221733'><text x='240' y='438'>trace database: one run cycle</text><text x='250' y='477'>01 html_visible</text><text x='250' y='507'>02 model_decision</text><text x='250' y='537'>03 mapped_action</text><text x='250' y='567'>04 backend_return</text><text x='250' y='597'>05 stop_point</text></g><circle cx='925' cy='560' r='9' fill='#9b7fbc'/><path d='M920 560C800 670 425 672 365 276' fill='none' stroke='#9b7fbc' stroke-width='4' marker-end='url(#p1)'/><text x='672' y='690' font-family='sans-serif' font-size='20' fill='#6b5a82' text-anchor='middle'>the correction is grounded in the recorded sequence</text></svg>
