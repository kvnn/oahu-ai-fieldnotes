<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Failure Named and Returned</title><desc>A traced failure is extracted from a tangled workflow, named on a trace card, converted into a correction, and returned to the next run.</desc><defs><marker id='a5' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='p5' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker></defs><g fill='none' stroke='#c8bfa9' stroke-width='2'><path d='M130 260C220 190 260 330 350 250S455 205 500 265'/><path d='M130 300C220 380 300 210 380 335S455 420 520 330'/><path d='M130 340C230 305 285 410 380 390S470 300 520 380'/><path d='M130 380C250 460 300 500 390 445S475 430 520 455'/></g><path d='M130 300C220 380 300 210 380 335S455 420 520 330' fill='none' stroke='#221733' stroke-width='4' stroke-linecap='round'/><circle cx='520' cy='330' r='16' fill='#9b7fbc'/><rect x='480' y='190' width='240' height='190' rx='12' fill='#efe6ce' stroke='#221733' stroke-width='3'/><text x='505' y='230' font-family='sans-serif' font-size='20' fill='#221733'>trace card</text><path d='M505 250H695' stroke='#aba28d' stroke-width='2'/><text x='505' y='282' font-family='sans-serif' font-size='18' fill='#221733'>step 042</text><text x='505' y='314' font-family='sans-serif' font-size='18' fill='#221733'>stopped early</text><text x='505' y='346' font-family='sans-serif' font-size='18' fill='#221733'>missing condition</text><path d='M720 285H805' fill='none' stroke='#221733' stroke-width='4' marker-end='url(#a5)'/><rect x='810' y='220' width='245' height='130' rx='12' fill='none' stroke='#221733' stroke-width='3'/><text x='932' y='265' font-family='sans-serif' font-size='21' fill='#221733' text-anchor='middle'>correction</text><text x='932' y='300' font-family='sans-serif' font-size='17' fill='#221733' text-anchor='middle'>ask clarification</text><text x='932' y='326' font-family='sans-serif' font-size='17' fill='#221733' text-anchor='middle'>before terminal state</text><path d='M932 350C900 520 650 625 345 525C245 492 185 442 160 395' fill='none' stroke='#9b7fbc' stroke-width='4' marker-end='url(#p5)'/><rect x='115' y='505' width='250' height='80' rx='10' fill='none' stroke='#221733' stroke-width='3'/><text x='240' y='552' font-family='sans-serif' font-size='20' fill='#221733' text-anchor='middle'>next run inherits it</text><g font-family='sans-serif' font-size='18' fill='#6b5a82' text-anchor='middle'><text x='600' y='675'>with traces, failures have shape: named, located, returned</text></g></svg>
