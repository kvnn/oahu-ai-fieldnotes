<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Mapper With Guardrails</title><desc>A model output passes through a structured action mapper and guarded frontend controls. A blocked invalid click is highlighted and each transition writes to the trace store.</desc><defs><marker id='a4' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='p4' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker></defs><g fill='none' stroke='#221733' stroke-width='3' stroke-linejoin='round'><rect x='105' y='150' width='220' height='150' rx='12'/><rect x='425' y='150' width='220' height='150' rx='12'/><rect x='745' y='150' width='320' height='150' rx='12'/></g><g font-family='sans-serif' fill='#221733'><text x='130' y='188' font-size='21'>model decision</text><text x='130' y='225' font-size='17'>{ field: symptom }</text><text x='130' y='252' font-size='17'>{ action: click }</text><text x='450' y='188' font-size='21'>action mapper</text><text x='450' y='225' font-size='17'>selector lookup</text><text x='450' y='252' font-size='17'>state validation</text><text x='770' y='188' font-size='21'>visible controls</text></g><g fill='none' stroke='#aba28d' stroke-width='3'><rect x='775' y='215' width='95' height='38' rx='6'/><rect x='890' y='215' width='95' height='38' rx='6'/><rect x='1005' y='215' width='40' height='38' rx='6'/></g><text x='822' y='241' font-family='sans-serif' font-size='15' fill='#221733' text-anchor='middle'>fill</text><text x='937' y='241' font-family='sans-serif' font-size='15' fill='#221733' text-anchor='middle'>next</text><path d='M325 225H420' fill='none' stroke='#221733' stroke-width='4' marker-end='url(#a4)'/><path d='M645 225H740' fill='none' stroke='#221733' stroke-width='4' marker-end='url(#a4)'/><path d='M535 300V390' fill='none' stroke='#9b7fbc' stroke-width='5' marker-end='url(#p4)'/><circle cx='535' cy='410' r='18' fill='#9b7fbc'/><path d='M525 400l20 20M545 400l-20 20' stroke='#efe6ce' stroke-width='4'/><text x='575' y='417' font-family='sans-serif' font-size='19' fill='#221733'>invalid click blocked</text><rect x='200' y='520' width='800' height='115' rx='10' fill='none' stroke='#221733' stroke-width='3'/><text x='225' y='555' font-family='sans-serif' font-size='20' fill='#221733'>trace store</text><g stroke='#c8bfa9' stroke-width='2'><path d='M220 575H980'/><path d='M220 605H980'/></g><g font-family='sans-serif' font-size='17' fill='#221733'><text x='245' y='598'>request</text><text x='425' y='598'>mapped selector</text><text x='650' y='598'>frontend verdict</text><text x='845' y='598'>backend return</text></g><g fill='none' stroke='#aba28d' stroke-width='2'><path d='M215 300V520'/><path d='M535 430V520'/><path d='M905 300V520'/></g><path d='M640 520C720 455 755 360 765 258' fill='none' stroke='#221733' stroke-width='3' marker-end='url(#a4)'/><text x='600' y='710' font-family='sans-serif' font-size='20' fill='#6b5a82' text-anchor='middle'>reliability lives in the mappings, guards, and records between steps</text></svg>
