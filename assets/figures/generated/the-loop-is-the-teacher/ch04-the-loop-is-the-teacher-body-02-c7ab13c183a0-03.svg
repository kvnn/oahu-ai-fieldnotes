<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Evidence Spine with Outer Repair</title><desc>A six-part simulator loop surrounds a deterministic trace ledger. Every layer appends a record, and a separate debugging loop passes through me plus coding agent and patch failsafe refactor before returning to the runtime loop.</desc><defs><marker id='es-dark' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='es-purple' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker><marker id='es-hair' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='5' markerHeight='5' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#8b8474'/></marker></defs><text x='70' y='58' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='25' fill='#221733'>PATTERN ONE — THE TRACE LOOP</text><path d='M465 118H735L970 260V540L735 682H465L230 540V260Z' fill='none' stroke='#c8bfa9' stroke-width='2' stroke-dasharray='8 10'/><path d='M465 118H735L970 260V540L735 682' fill='none' stroke='#221733' stroke-width='7' stroke-linejoin='round' stroke-linecap='round' marker-end='url(#es-dark)'/><path d='M735 682H465L230 540V260L465 118' fill='none' stroke='#221733' stroke-width='7' stroke-linejoin='round' stroke-linecap='round' marker-end='url(#es-dark)'/><text x='600' y='106' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='16' fill='#221733'>one form step repeats</text><g fill='none' stroke='#221733' stroke-width='3'><rect x='435' y='82' width='330' height='72' rx='14'/><rect x='850' y='220' width='258' height='78' rx='14'/><rect x='850' y='502' width='258' height='78' rx='14'/><rect x='435' y='642' width='330' height='72' rx='14'/><rect x='92' y='502' width='258' height='78' rx='14'/><rect x='92' y='220' width='258' height='78' rx='14'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#221733' text-anchor='middle'><text x='600' y='111'>incident description +</text><text x='600' y='133'>visible HTML</text><text x='979' y='250'>simulator LLM chooses</text><text x='979' y='272'>next action</text><text x='979' y='532'>action map</text><text x='979' y='554'>fill / click / stop</text><text x='600' y='671'>frontend guard</text><text x='600' y='693'>click verdict / invalid action</text><text x='221' y='532'>backend state check</text><text x='221' y='554'>+ return payload</text><text x='221' y='250'>new visible HTML</text><text x='221' y='272'>or legitimate stop</text></g><rect x='397' y='282' width='406' height='236' rx='17' fill='#efe6ce' stroke='#221733' stroke-width='4'/><text x='600' y='316' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#221733'>TRACE DATABASE</text><text x='600' y='340' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#6b5a82'>DETERMINISTIC LEDGER</text><g stroke='#aba28d' stroke-width='2'><path d='M425 365H775'/><path d='M425 390H775'/><path d='M425 415H775'/><path d='M425 440H775'/><path d='M425 465H775'/><path d='M425 490H775'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='13' fill='#221733'><text x='438' y='382'>what the model saw</text><text x='438' y='407'>what it chose</text><text x='438' y='432'>how the frontend interpreted it</text><text x='438' y='457'>what the backend returned</text><text x='438' y='482'>where the chain broke</text><text x='438' y='507'>why it stopped</text></g><g fill='none' stroke='#8b8474' stroke-width='1.5' marker-end='url(#es-hair)'><path d='M600 154V282'/><path d='M850 260L803 335'/><path d='M850 540L803 472'/><path d='M600 642V518'/><path d='M350 540L397 472'/><path d='M350 260L397 335'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12' text-anchor='middle' fill='#221733'><rect x='302' y='302' width='91' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='347' y='322'>wrong click</text><rect x='808' y='302' width='84' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='850' y='322'>early stop</text><rect x='292' y='498' width='112' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='348' y='518'>invalid branch</text><rect x='808' y='498' width='82' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='849' y='518'>slow path</text></g><g fill='none' stroke='#9b7fbc' stroke-width='4' stroke-linecap='round' marker-end='url(#es-purple)'><path d='M803 397C902 386 950 350 980 324'/><path d='M1067 340C1138 433 1128 574 1030 637'/><path d='M875 642C825 664 788 676 735 682'/></g><g fill='none' stroke='#9b7fbc' stroke-width='3'><rect x='980' y='267' width='150' height='72' rx='13'/><rect x='830' y='618' width='220' height='72' rx='13'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' text-anchor='middle' fill='#6b5a82'><text x='1055' y='297' font-size='14'>me +</text><text x='1055' y='319' font-size='14'>coding agent</text><text x='940' y='647' font-size='14'>patch / failsafe</text><text x='940' y='669' font-size='14'>/ refactor</text></g><text x='600' y='761' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#6b5a82'>“the loop closes against records, not recollection”</text></svg>
