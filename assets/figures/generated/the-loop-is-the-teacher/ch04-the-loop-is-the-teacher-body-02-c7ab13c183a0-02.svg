<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800' role='img' data-figure-system='fieldnotes-v1'><title>Ledger Inside the Runtime Ring</title><desc>Two loops: a dark six-step runtime simulator ring around a central trace database, and a separate lavender debugging loop that routes evidence through me and the coding agent before returning a patch to the runtime loop.</desc><defs><marker id='lir-dark' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#221733'/></marker><marker id='lir-purple' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='7' markerHeight='7' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#9b7fbc'/></marker><marker id='lir-hair' viewBox='0 0 10 10' refX='8' refY='5' markerWidth='5' markerHeight='5' orient='auto'><path d='M0 0L10 5L0 10Z' fill='#8b8474'/></marker></defs><text x='92' y='70' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='25' fill='#221733'>PATTERN ONE — THE TRACE LOOP</text><path d='M590 104C834 104 1015 244 1015 400C1015 556 834 696 590 696C346 696 165 556 165 400C165 244 346 104 590 104Z' fill='none' stroke='#c8bfa9' stroke-width='2' stroke-dasharray='7 11'/><path d='M707 111C890 145 1015 262 1015 400C1015 548 842 680 615 695' fill='none' stroke='#221733' stroke-width='7' stroke-linecap='round' marker-end='url(#lir-dark)'/><path d='M478 690C296 656 165 538 165 400C165 253 329 124 548 106' fill='none' stroke='#221733' stroke-width='7' stroke-linecap='round' marker-end='url(#lir-dark)'/><text x='590' y='114' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='16' fill='#221733'>one form step repeats</text><g fill='none' stroke='#221733' stroke-width='3'><rect x='450' y='55' width='280' height='75' rx='14'/><rect x='838' y='176' width='250' height='80' rx='14'/><rect x='852' y='455' width='242' height='82' rx='14'/><rect x='450' y='660' width='280' height='75' rx='14'/><rect x='92' y='455' width='250' height='82' rx='14'/><rect x='92' y='176' width='270' height='80' rx='14'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#221733' text-anchor='middle'><text x='590' y='84'>incident description</text><text x='590' y='107'>+ visible HTML</text><text x='963' y='207'>simulator LLM</text><text x='963' y='230'>chooses next action</text><text x='973' y='485'>structured action map</text><text x='973' y='508'>fill / click / stop</text><text x='590' y='689'>frontend guard</text><text x='590' y='712'>click verdict / invalid?</text><text x='217' y='485'>backend state check</text><text x='217' y='508'>+ return payload</text><text x='227' y='207'>new visible HTML</text><text x='227' y='230'>or legitimate stop</text></g><rect x='390' y='290' width='400' height='228' rx='18' fill='#efe6ce' stroke='#221733' stroke-width='4'/><text x='590' y='323' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#221733'>TRACE DATABASE</text><text x='590' y='347' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='14' fill='#6b5a82'>DETERMINISTIC LEDGER</text><g stroke='#aba28d' stroke-width='2'><path d='M420 370H760'/><path d='M420 394H760'/><path d='M420 418H760'/><path d='M420 442H760'/><path d='M420 466H760'/><path d='M420 490H760'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='13' fill='#221733'><text x='434' y='386'>what the model saw</text><text x='434' y='410'>what it chose</text><text x='434' y='434'>how the frontend interpreted it</text><text x='434' y='458'>what the backend returned</text><text x='434' y='482'>where the chain broke</text><text x='434' y='506'>why it stopped</text></g><text x='590' y='543' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='13' fill='#8b8474'>records only; no next-action authority</text><g fill='none' stroke='#8b8474' stroke-width='1.5' marker-end='url(#lir-hair)'><path d='M590 130V290'/><path d='M838 222L790 335'/><path d='M852 492L790 468'/><path d='M590 660V518'/><path d='M342 492L390 468'/><path d='M362 222L390 337'/></g><g fill='none' stroke='#9b7fbc' stroke-width='4' stroke-linecap='round' marker-end='url(#lir-purple)'><path d='M790 383C912 360 944 323 964 285'/><path d='M1048 276C1140 360 1140 566 1042 636'/><path d='M918 662C842 689 781 697 731 697'/></g><g fill='none' stroke='#9b7fbc' stroke-width='3'><rect x='960' y='210' width='160' height='72' rx='13'/><rect x='850' y='625' width='230' height='72' rx='13'/></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' fill='#6b5a82' text-anchor='middle'><text x='1040' y='240' font-size='14'>me +</text><text x='1040' y='262' font-size='14'>coding agent</text><text x='965' y='653' font-size='14'>patch / failsafe</text><text x='965' y='675' font-size='14'>/ refactor</text></g><g font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='12' fill='#221733' text-anchor='middle'><rect x='284' y='282' width='92' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='330' y='302'>wrong click</text><rect x='804' y='282' width='86' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='847' y='302'>early stop</text><rect x='277' y='521' width='112' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='333' y='541'>invalid branch</text><rect x='805' y='521' width='80' height='30' rx='15' fill='none' stroke='#9b7fbc' stroke-width='2'/><text x='845' y='541'>slow path</text></g><text x='600' y='774' text-anchor='middle' font-family='ui-monospace, SFMono-Regular, Menlo, Consolas, monospace' font-size='18' fill='#6b5a82'>“the loop closes against records, not recollection”</text></svg>
