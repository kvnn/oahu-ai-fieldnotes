<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg" data-figure-system="fieldnotes-v1">
<title>The feedback loop</title>
<desc>A human standard enters an AI workflow. The model produces a first pass, which moves through traces, score, and state before correction returns into the model. Durable output exits only after the loop has closed.</desc>
<style>.m{font-family:'IBM Plex Mono',monospace;}</style>

<defs>
<marker id="loop-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="220" fill="#efe6ce"/>

<text class="m" x="34" y="34" font-size="9" letter-spacing="2.4" fill="#6b5a82"></text>
<text class="m" x="646" y="34" text-anchor="end" font-size="9" letter-spacing="1.8" fill="#8b8474"></text>

<circle cx="78" cy="112" r="5" fill="#9b7fbc" opacity="0.9"/>
<path d="M83 112H170" stroke="#9b7fbc" stroke-width="1.2" opacity="0.85" fill="none"/>
<text class="m" x="78" y="132" text-anchor="middle" font-size="8" letter-spacing="2.4" fill="#6b5a82">YOU</text>

<polygon points="170,74 170,150 238,112" fill="#efe6ce" stroke="#aba28d" stroke-width="0.75" opacity="0.92"/>
<g fill="#aba28d" opacity="0.34">
<rect x="184" y="88" width="24" height="2.4" rx="0.6"/>
<rect x="184" y="98" width="42" height="2.4" rx="0.6"/>
<rect x="184" y="108" width="52" height="2.4" rx="0.6"/>
<rect x="184" y="118" width="44" height="2.4" rx="0.6"/>
<rect x="184" y="128" width="26" height="2.4" rx="0.6"/>
</g>
<text class="m" x="204" y="166" text-anchor="middle" font-size="6.5" letter-spacing="1.4" fill="#8b8474"></text>

<path d="M78 104C126 42 250 50 326 62" stroke="#9b7fbc" stroke-width="0.9" opacity="0.55" stroke-dasharray="4 6" fill="none"/>
<path d="M326 62H524" stroke="#aba28d" stroke-width="0.8" opacity="0.7" stroke-dasharray="5 7" fill="none"/>
<text class="m" x="330" y="55" text-anchor="middle" font-size="7.5" letter-spacing="2.2" fill="#6b5a82"></text>
<text class="m" x="548" y="65" text-anchor="middle" font-size="7.5" letter-spacing="2.2" fill="#8b8474">EXPERTISE</text>

<g fill="none" stroke="#9b7fbc" stroke-width="1.25" opacity="0.82" marker-end="url(#loop-arrow)">
<path d="M238 112C270 74 315 74 354 88"/>
<path d="M474 88C528 88 552 101 552 118"/>
<path d="M552 118C552 137 528 150 474 150"/>
<path d="M354 150C304 154 263 144 238 112"/>
</g>

<g stroke="#aba28d" stroke-width="0.75" opacity="0.82">
<rect x="354" y="74" width="120" height="28" rx="4" fill="#efe6ce"/>
<rect x="354" y="106" width="120" height="28" rx="4" fill="#efe6ce"/>
<rect x="354" y="138" width="120" height="28" rx="4" fill="#efe6ce"/>
</g>

<g fill="#9b7fbc" opacity="0.9">
<circle cx="354" cy="88" r="3"/>
<circle cx="474" cy="118" r="3"/>
<circle cx="354" cy="150" r="3"/>
</g>

<g class="m" font-size="7" letter-spacing="1.6">
<text x="414" y="91" text-anchor="middle" fill="#8b8474">TRACES</text>
<text x="414" y="123" text-anchor="middle" fill="#221733">SCORE</text>
<text x="414" y="155" text-anchor="middle" fill="#8b8474">STATE</text>
</g>

<g fill="#aba28d" opacity="0.36">
<rect x="372" y="84" width="22" height="2" rx="0.5"/>
<rect x="372" y="92" width="42" height="2" rx="0.5"/>
<rect x="372" y="148" width="24" height="2" rx="0.5"/>
<rect x="372" y="156" width="38" height="2" rx="0.5"/>
</g>

<path d="M414 102V106" stroke="#aba28d" stroke-width="0.75" opacity="0.75" marker-end="url(#loop-arrow)" fill="none"/>
<path d="M414 134V138" stroke="#aba28d" stroke-width="0.75" opacity="0.75" marker-end="url(#loop-arrow)" fill="none"/>

<text class="m" x="288" y="143" text-anchor="middle" font-size="7" letter-spacing="1.8" fill="#8b8474"></text>
<text class="m" x="300" y="82" text-anchor="middle" font-size="6" letter-spacing="1.3" fill="#aba28d"></text>
<text class="m" x="540" y="90" text-anchor="middle" font-size="6" letter-spacing="1.3" fill="#aba28d">EVALUATE</text>
<text class="m" x="536" y="154" text-anchor="middle" font-size="6" letter-spacing="1.3" fill="#aba28d">PERSIST</text>

<path d="M474 118H590" stroke="#9b7fbc" stroke-width="1.1" opacity="0.82" marker-end="url(#loop-arrow)" fill="none"/>
<rect x="600" y="107" width="18" height="22" rx="2" fill="#efe6ce" stroke="#aba28d" stroke-width="0.75" opacity="0.9"/>
<g fill="#aba28d" opacity="0.38">
<rect x="605" y="113" width="8" height="1.8" rx="0.5"/>
<rect x="605" y="119" width="10" height="1.8" rx="0.5"/>
</g>
<text class="m" x="645" y="122" text-anchor="middle" font-size="7" letter-spacing="1.6" fill="#8b8474">OUTPUTS</text>

<text class="m" x="340" y="198" text-anchor="middle" font-size="8" letter-spacing="2" fill="#6b5a82"></text>
</svg>
