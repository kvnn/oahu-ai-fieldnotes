</g>
<text class="m" x="127" y="140" text-anchor="middle" font-size="6" letter-spacing="1.5" fill="#c8bfa9" opacity="0.9">AMPLIFIER</text>
<text class="m" x="16" y="108" font-size="8" letter-spacing="2" fill="#6b5a82">You</text>
<text class="m" x="208" y="158" text-anchor="end" font-size="8" letter-spacing="1.5" fill="#c8bfa9"></text>
</svg>
