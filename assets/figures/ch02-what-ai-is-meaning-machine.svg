<svg width="100%" viewBox="0 0 260 190" role="img" xmlns="http://www.w3.org/2000/svg" data-figure-system="fieldnotes-v1">
<title>Intelligence amplifier</title>
<desc>A single human signal (purple) enters a model holding compressed human language and exits amplified, its reach fanning across domains it could not enter unaided — still the human's own intelligence, made larger.</desc>
