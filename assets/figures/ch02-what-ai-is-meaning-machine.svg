<g fill="#aba28d" opacity="0.35">
<rect x="110" y="77" width="10" height="2" rx="0.5"/>
<rect x="110" y="85" width="25" height="2" rx="0.5"/>
<rect x="110" y="93" width="36" height="2" rx="0.5"/>
<rect x="110" y="101" width="32" height="2" rx="0.5"/>
<rect x="110" y="109" width="18" height="2" rx="0.5"/>
</g>
<g stroke="#9b7fbc" stroke-width="1" opacity="0.8" fill="none">
<path d="M150 96L208 54"/>
<path d="M150 96L210 75"/>
<path d="M150 96L212 96"/>
<path d="M150 96L210 117"/>
<path d="M150 96L208 138"/>
</g>

